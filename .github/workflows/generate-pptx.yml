name: Generate Lincoln AEP PPTX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install python-pptx
      
      - name: Generate PPTX
        run: python lincoln_aep_converter.py
      
      - name: Upload PPTX as artifact
        uses: actions/upload-artifact@v3
        with:
          name: lincoln_AEP
          path: lincoln_AEP.pptx
