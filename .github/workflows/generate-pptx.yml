name: Generate Lincoln AEP PPTX

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install python-pptx
      
      - name: Generate PPTX
        run: python lincoln_aep_converter.py
      
      - name: Commit and push PPTX
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add lincoln_AEP.pptx
          git commit -m "Generate lincoln_AEP.pptx" || echo "No changes to commit"
          git push
